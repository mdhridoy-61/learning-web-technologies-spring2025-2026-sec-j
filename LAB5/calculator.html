<!DOCTYPE html>
<html>
<head>
<title>Div Calculator</title>

<style>

body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    margin-top:50px;
}

.calculator{
    width:220px;
}

.display{
    height:50px;
    
    background:rgb(57, 57, 118);
    color:white;
    font-size:22px;
    text-align:right;
    padding:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.btn{
    border:1px solid gray;
    padding:20px;
    text-align:center;
    cursor:pointer;
    font-size:18px;
}

.btn:hover{
    background:#eee;
}

</style>
</head>

<body>

<div class="calculator">

<div class="display" id="display"></div>

<div class="buttons">

<div class="btn" onclick="add('7')">7</div>
<div class="btn" onclick="add('8')">8</div>
<div class="btn" onclick="add('9')">9</div>
<div class="btn" onclick="add('/')">/</div>

<div class="btn" onclick="add('4')">4</div>
<div class="btn" onclick="add('5')">5</div>
<div class="btn" onclick="add('6')">6</div>
<div class="btn" onclick="add('*')">*</div>

<div class="btn" onclick="add('1')">1</div>
<div class="btn" onclick="add('2')">2</div>
<div class="btn" onclick="add('3')">3</div>
<div class="btn" onclick="add('-')">-</div>

<div class="btn" onclick="add('0')">0</div>
<div class="btn" onclick="clearDisplay()">C</div>
<div class="btn" onclick="calculate()">=</div>
<div class="btn" onclick="add('+')">+</div>

</div>

</div>

<script>

let display = document.getElementById("display");

function add(value){
    display.innerText += value;
}

function clearDisplay(){
    display.innerText = "";
}

function calculate(){
    display.innerText = eval(display.innerText);
}

/* Keyboard Support */

document.addEventListener("keydown", function(event){

let key = event.key;

if(!isNaN(key) || key=="+" || key=="-" || key=="*" || key=="/"){
display.innerText += key;
}

if(key=="Enter"){
calculate();
}

if(key=="Backspace"){
display.innerText = display.innerText.slice(0,-1);
}

if(key=="Escape"){
clearDisplay();
}

});

</script>

</body>
</html>
