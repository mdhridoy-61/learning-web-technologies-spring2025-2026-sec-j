<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:40px;
}

h1{
    margin-bottom:10px;
}

#board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(3,100px);
    gap:5px;
    justify-content:center;
    margin:20px auto;
}

.cell{
    width:100px;
    height:100px;
    font-size:40px;
    background:#f0f0f0;
    border:2px solid #333;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.cell:hover{
    background:#ddd;
}

.win{
    background:#90ee90;
}

#status{
    font-size:20px;
    margin:15px;
}

#score{
    margin:10px;
    font-size:18px;
}

button{
    padding:10px 20px;
    font-size:16px;
}
</style>

</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="score">
Player X: <span id="scoreX">0</span> |
Player O: <span id="scoreO">0</span>
</div>

<div id="status">Current Player: X</div>

<div id="board">
<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>
<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>
<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>
</div>

<button id="reset">Reset Game</button>

<script>

const cells = document.querySelectorAll(".cell")
const statusText = document.getElementById("status")
const resetBtn = document.getElementById("reset")

const scoreX = document.getElementById("scoreX")
const scoreO = document.getElementById("scoreO")

let board = ["","","","","","","","",""]
let currentPlayer = "X"
let running = true

let xScore = 0
let oScore = 0

const winConditions = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
]

cells.forEach(cell => cell.addEventListener("click", cellClicked))
resetBtn.addEventListener("click", resetGame)

function cellClicked(){

const index = this.getAttribute("data-index")

if(board[index] != "" || !running){
return
}

board[index] = currentPlayer
this.textContent = currentPlayer

checkWinner()

}

function checkWinner(){

let roundWon = false

for(let i=0;i<winConditions.length;i++){

const [a,b,c] = winConditions[i]

if(board[a] == "" || board[b] == "" || board[c] == ""){
continue
}

if(board[a] == board[b] && board[b] == board[c]){

roundWon = true

cells[a].classList.add("win")
cells[b].classList.add("win")
cells[c].classList.add("win")

break
}
}

if(roundWon){

statusText.textContent = currentPlayer + " Wins!"

running = false

if(currentPlayer == "X"){
xScore++
scoreX.textContent = xScore
}
else{
oScore++
scoreO.textContent = oScore
}

return
}

if(!board.includes("")){
statusText.textContent = "It's a Draw!"
running = false
return
}

switchPlayer()

}

function switchPlayer(){

currentPlayer = currentPlayer == "X" ? "O" : "X"

statusText.textContent = "Current Player: " + currentPlayer

}

function resetGame(){

board = ["","","","","","","","",""]

cells.forEach(cell=>{
cell.textContent=""
cell.classList.remove("win")
})

currentPlayer = "X"
running = true

statusText.textContent = "Current Player: X"

}

</script>

</body>
</html>
